# ===============================
# PROJECT CONFIGURATION
# ===============================

project:
  name: "Emergency Vehicle Detection"
  version: "1.0"
  author: "Aditya Parmar"

# ===============================
# VISION (YOLO) CONFIG
# ===============================

vision:
  model: "yolov8n.pt"
  data: "corrected_dataset/data.yaml"
  epochs: 5
  imgsz: 320
  batch: 2
  device: "cpu"

# ===============================
# AUDIO CONFIG
# ===============================

audio:
  data_path: "audio_data"
  sample_rate: 22050
  n_mfcc: 13
  epochs: 5
  batch: 2
  classes:
    - siren
    - normal

# ===============================
# TRAINING SETTINGS
# ===============================

training:
  save_dir: "runs/"
  log: true

# ===============================
# INFERENCE SETTINGS
# ===============================

inference:
  confidence_threshold: 0.5
  iou_threshold: 0.7

# ===============================
# SYSTEM SETTINGS
# ===============================

system:
  python_version: "3.11"
  framework: "Ultralytics YOLOv8"
